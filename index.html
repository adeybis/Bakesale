<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Easter Bake Sale</title>

<style>

body{
font-family:Arial;
background:#f3f1ea;
margin:0;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.poster{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin:6px;
border:1px solid #ccc;
border-radius:5px;
width:90%;
max-width:280px;
}

.qty{
width:60px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#6c7f33;
color:white;
padding:10px;
}

td{
border:1px solid #ddd;
padding:10px;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

button{
margin:8px;
padding:12px 22px;
background:#25D366;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.clearBtn{
background:#888;
}

.callBtn{
background:#3a6ea5;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
padding:15px;
}

.popupBox{
background:white;
padding:25px;
border-radius:10px;
max-width:350px;
width:100%;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<img src="poster.jpg" class="poster">

<h2>Easter Bake Sale</h2>

Name<br>
<input id="name"><br>

Phone Number<br>
<input id="phone">

<table>

<tr>
<th>Item</th>
<th>Price</th>
<th>Qty</th>
</tr>

<tr>
<td>Ma'amoul Dates</td>
<td>$25</td>
<td><input type="number" class="qty" id="q1" value="0" min="0" onchange="calc()"></td>
</tr>

<tr>
<td>Ma'amoul Pistachio</td>
<td>$30</td>
<td><input type="number" class="qty" id="q2" value="0" min="0" onchange="calc()"></td>
</tr>

<tr>
<td>Ma'amoul Walnuts</td>
<td>$25</td>
<td><input type="number" class="qty" id="q3" value="0" min="0" onchange="calc()"></td>
</tr>

<tr>
<td>Ghareybeh</td>
<td>$12</td>
<td><input type="number" class="qty" id="q4" value="0" min="0" onchange="calc()"></td>
</tr>

<tr>
<td>Hazelnut Ghareybeh</td>
<td>$15</td>
<td><input type="number" class="qty" id="q5" value="0" min="0" onchange="calc()"></td>
</tr>

<tr>
<td>Kibbeh</td>
<td>$25</td>
<td><input type="number" class="qty" id="q6" value="0" min="0" onchange="calc()"></td>
</tr>

</table>

<div class="total">
Total: $ <span id="grand">0</span>
</div>

<button onclick="previewOrder()">Send Order</button>
<button class="clearBtn" onclick="clearOrder()">Clear</button>

<br>

<a href="tel:+19517079772">
<button class="callBtn">Call to Order</button>
</a>

</div>

<div class="popup" id="popup">

<div class="popupBox">

<h3>Order Summary</h3>

<div id="summary"></div>

<br>

<button onclick="sendWhatsApp()">Confirm & Send</button>
<button onclick="closePopup()" class="clearBtn">Cancel</button>

</div>

</div>

<script>

let prices=[25,30,25,12,15,25]

function calc(){

let total=0

for(let i=1;i<=6;i++){

let q=parseInt(document.getElementById("q"+i).value) || 0
total+=q*prices[i-1]

}

document.getElementById("grand").innerHTML=total

}

function clearOrder(){

document.getElementById("name").value=""
document.getElementById("phone").value=""

for(let i=1;i<=6;i++){
document.getElementById("q"+i).value=0
}

calc()

}

function previewOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

if(name==""||phone==""){
alert("Please enter your name and phone number")
return
}

if(document.getElementById("grand").innerHTML=="0"){
alert("Please select at least one item")
return
}

let items=[
["Ma'amoul Dates","q1",25],
["Ma'amoul Pistachio","q2",30],
["Ma'amoul Walnuts","q3",25],
["Ghareybeh","q4",12],
["Hazelnut Ghareybeh","q5",15],
["Kibbeh","q6",25]
]

let text="<b>Name:</b> "+name+"<br>"
text+="<b>Phone:</b> "+phone+"<br><br>"

let total=0

items.forEach(function(i){

let qty=parseInt(document.getElementById(i[1]).value)

if(qty>0){

let subtotal=qty*i[2]
total+=subtotal

text+=qty+" x "+i[0]+" ($"+i[2]+") = $"+subtotal+"<br>"

}

})

text+="<br><b>Total: $"+total+"</b>"

document.getElementById("summary").innerHTML=text
document.getElementById("popup").style.display="flex"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function sendWhatsApp(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

let items=[
["Ma'amoul Dates","q1"],
["Ma'amoul Pistachio","q2"],
["Ma'amoul Walnuts","q3"],
["Ghareybeh","q4"],
["Hazelnut Ghareybeh","q5"],
["Kibbeh","q6"]
]

let msg="Easter Bake Sale Order%0A%0A"
msg+="Name: "+name+"%0A"
msg+="Phone: "+phone+"%0A%0A"

items.forEach(function(i){

let qty=document.getElementById(i[1]).value

if(qty>0){
msg+=i[0]+": "+qty+"%0A"
}

})

msg+="%0ATotal: $"+document.getElementById("grand").innerHTML

window.open("https://wa.me/19517079772?text="+msg)

alert("Thank you! Your order has been sent.")

closePopup()

}

</script>

</body>
</html>
