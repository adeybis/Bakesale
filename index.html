<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Easter Bake Sale</title>

<style>

body{
font-family:Arial;
background:#f3f1ea;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.poster{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:4px;
width:250px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#6c7f33;
color:white;
padding:12px;
}

td{
border:1px solid #ddd;
padding:10px;
}

.qtyBox{
display:flex;
justify-content:center;
align-items:center;
gap:5px;
}

.qtyBtn{
width:30px;
height:30px;
font-size:18px;
cursor:pointer;
}

.qty{
width:40px;
text-align:center;
}

.total{
font-size:24px;
font-weight:bold;
margin-top:20px;
}

button{
margin:10px;
padding:14px 25px;
background:#25D366;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

.clearBtn{
background:#888;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
padding:30px;
border-radius:10px;
max-width:400px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<img src="poster.jpg" class="poster">

Name<br>
<input id="name"><br>

Phone Number<br>
<input id="phone">

<table>

<tr>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
</tr>

<tr>
<td>Ma'amoul Dates</td>
<td>$25</td>
<td>
<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty('q1',-1)">-</button>
<input class="qty" id="q1" value="0" readonly>
<button class="qtyBtn" onclick="changeQty('q1',1)">+</button>
</div>
</td>
</tr>

<tr>
<td>Ma'amoul Pistachio</td>
<td>$30</td>
<td>
<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty('q2',-1)">-</button>
<input class="qty" id="q2" value="0" readonly>
<button class="qtyBtn" onclick="changeQty('q2',1)">+</button>
</div>
</td>
</tr>

<tr>
<td>Ma'amoul Walnuts</td>
<td>$25</td>
<td>
<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty('q3',-1)">-</button>
<input class="qty" id="q3" value="0" readonly>
<button class="qtyBtn" onclick="changeQty('q3',1)">+</button>
</div>
</td>
</tr>

<tr>
<td>Ghareybeh</td>
<td>$12</td>
<td>
<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty('q4',-1)">-</button>
<input class="qty" id="q4" value="0" readonly>
<button class="qtyBtn" onclick="changeQty('q4',1)">+</button>
</div>
</td>
</tr>

<tr>
<td>Hazelnut Ghareybeh</td>
<td>$15</td>
<td>
<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty('q5',-1)">-</button>
<input class="qty" id="q5" value="0" readonly>
<button class="qtyBtn" onclick="changeQty('q5',1)">+</button>
</div>
</td>
</tr>

<tr>
<td>Kibbeh</td>
<td>$25</td>
<td>
<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty('q6',-1)">-</button>
<input class="qty" id="q6" value="0" readonly>
<button class="qtyBtn" onclick="changeQty('q6',1)">+</button>
</div>
</td>
</tr>

</table>

<div class="total">
Total: $ <span id="grand">0</span>
</div>

<button onclick="previewOrder()">Send Order</button>
<button class="clearBtn" onclick="clearOrder()">Clear</button>

</div>

<div class="popup" id="popup">

<div class="popupBox">

<h3>Order Summary</h3>

<div id="summary"></div>

<br>

<button onclick="sendWhatsApp()">Confirm & Send</button>
<button onclick="closePopup()" class="clearBtn">Cancel</button>

</div>

</div>

<script>

let prices=[25,30,25,12,15,25]

function changeQty(id,change){

let el=document.getElementById(id)

let value=parseInt(el.value)+change

if(value<0)value=0

el.value=value

calc()

}

function calc(){

let total=0

for(let i=1;i<=6;i++){

let q=document.getElementById("q"+i).value

total+=q*prices[i-1]

}

document.getElementById("grand").innerHTML=total

}

function clearOrder(){

document.getElementById("name").value=""
document.getElementById("phone").value=""

for(let i=1;i<=6;i++){
document.getElementById("q"+i).value=0
}

calc()

}

function previewOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

if(name==""||phone==""){
alert("Please enter your name and phone number")
return
}

let items=[
["Ma'amoul Dates","q1"],
["Ma'amoul Pistachio","q2"],
["Ma'amoul Walnuts","q3"],
["Ghareybeh","q4"],
["Hazelnut Ghareybeh","q5"],
["Kibbeh","q6"]
]

let text="Name: "+name+"<br>"
text+="Phone: "+phone+"<br><br>"

let hasItems=false

items.forEach(function(i){

let qty=parseInt(document.getElementById(i[1]).value)

if(qty>0){
text+=i[0]+" : "+qty+"<br>"
hasItems=true
}

})

if(!hasItems){
alert("Please select at least one item")
return
}

text+="<br><b>Total: $"+document.getElementById("grand").innerHTML+"</b>"

document.getElementById("summary").innerHTML=text

document.getElementById("popup").style.display="flex"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function sendWhatsApp(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

let items=[
["Ma'amoul Dates","q1"],
["Ma'amoul Pistachio","q2"],
["Ma'amoul Walnuts","q3"],
["Ghareybeh","q4"],
["Hazelnut Ghareybeh","q5"],
["Kibbeh","q6"]
]

let msg="Easter Bake Sale Order%0A%0A"
msg+="Name: "+name+"%0A"
msg+="Phone: "+phone+"%0A%0A"

items.forEach(function(i){

let qty=document.getElementById(i[1]).value

if(qty>0){
msg+=i[0]+": "+qty+"%0A"
}

})

msg+="%0ATotal: $"+document.getElementById("grand").innerHTML

window.open("https://wa.me/19517079772?text="+msg)

closePopup()

}

</script>

</body>
</html>
